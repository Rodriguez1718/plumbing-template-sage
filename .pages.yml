media:
  input: public/images
  output: /images

content:
  - name: pages
    label: Pages
    path: src/data/pages
    type: collection
    format: json
    subfolders: true
    filename: "{primary}.json"
    view:
      primary: meta.title
      fields:
        - meta.title
        - meta.description
      sort:
        - meta.title
      default:
        sort: meta.title
        order: asc
      layout: tree
      node:
        filename: index.json
        hideDirs: nodes
    fields:
      - name: meta
        label: Meta
        type: object
        fields:
          - name: title
            label: Page Title
            type: string
            required: true
          - name: description
            label: Meta Description
            type: text
      - name: sections
        label: Sections
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{fields.component} ({index})"
        fields:
          - name: component
            label: Component
            type: string
            required: true
          - name: props
            label: Props
            type: object
            fields:
              - name: variant
                label: Variant
                type: string
              - name: title
                label: Title
                type: string
              - name: subtitle
                label: Subtitle
                type: text
              - name: description
                label: Description
                type: text
              - name: badge
                label: Badge
                type: string
              - name: buttonText
                label: Button Text
                type: string
              - name: buttonHref
                label: Button Link
                type: string
              - name: image
                label: Image
                type: string
              - name: imagePosition
                label: Image Position
                type: string
              - name: phone
                label: Phone
                type: string
              - name: phoneLabel
                label: Phone Label
                type: string
              - name: mapAddress
                label: Map Address
                type: string
              - name: slides
                label: Slides
                type: object
                list: true
                fields:
                  - name: title
                    label: Title
                    type: string
                  - name: subtitle
                    label: Subtitle
                    type: text
                  - name: image
                    label: Image
                    type: string
                  - name: promoTitle
                    label: Promo Title
                    type: string
                  - name: promoText
                    label: Promo Text
                    type: string
              - name: features
                label: Features
                type: object
                list: true
                fields:
                  - name: icon
                    label: Icon
                    type: string
                  - name: text
                    label: Text
                    type: string
              - name: badges
                label: Badges
                type: object
                list: true
                fields:
                  - name: name
                    label: Name
                    type: string
                  - name: image
                    label: Image
                    type: string
                  - name: small
                    label: Small
                    type: boolean
              - name: coupons
                label: Coupons
                type: object
                list: true
                fields:
                  - name: label
                    label: Label
                    type: string
                  - name: discount
                    label: Discount
                    type: string
                  - name: description
                    label: Description
                    type: text
                  - name: expires
                    label: Expires
                    type: string
              - name: tiles
                label: Tiles
                type: object
                list: true
                fields:
                  - name: type
                    label: Type
