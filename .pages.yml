                  - name: title
                    label: Title
                    type: string
                  - name: headline
                    label: Headline
                    type: string
                    list: true
                  - name: subheadline
                    label: Subheadline
                    type: string
                    list: true
                  - name: priceLabel
                    label: Price Label
                    type: string
                    list: true
                  - name: subtext
                    label: Subtext
                    type: string
                  - name: tag
                    label: Tag
                    type: string
                  - name: discount
                    label: Discount
                    type: string
                  - name: phone
                    label: Phone
